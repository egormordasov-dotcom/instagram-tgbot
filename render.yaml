services:
  - type: web
    name: instagram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: instagram-bot-db
          property: connectionString
      - key: ALLOWED_USERS
        sync: false
      - key: COOKIES_FILE
        value: cookies.json

databases:
  - name: instagram-bot-db
    plan: free
